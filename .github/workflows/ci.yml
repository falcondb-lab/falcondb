name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  failover-gate:
    name: Failover Gate
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: chmod +x scripts/ci_failover_gate.sh && ./scripts/ci_failover_gate.sh

  jdbc-smoke:
    name: JDBC Smoke
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: chmod +x scripts/ci_jdbc_smoke.sh && ./scripts/ci_jdbc_smoke.sh

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/ci_version_check.sh && ./scripts/ci_version_check.sh

  distributed-invariants:
    name: Distributed Invariants
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Epoch fence unit tests
        run: cargo test -p falcon_storage --lib -- epoch_fence
      - name: Distributed enhancements unit tests
        run: cargo test -p falcon_cluster --lib -- distributed_enhancements
      - name: Distributed integration tests
        run: cargo test -p falcon_cluster --test distributed_enhancements_integration
      - name: Failover determinism matrix
        run: cargo test -p falcon_cluster --test failover_determinism

  perf-regression:
    name: Performance Regression Gate
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run YCSB regression gate
        run: |
          chmod +x scripts/ci_perf_regression.sh
          ./scripts/ci_perf_regression.sh
        env:
          PERF_OPS: "5000"
          PERF_READ_PCT: "50"
          PERF_LOCAL_PCT: "80"
          PERF_SHARDS: "4"
          PERF_RECORDS: "1000"
          PERF_THREADS: "1"
          PERF_SEED: "42"
          PERF_ISOLATION: "rc"
          PERF_TPS_THRESHOLD: "15"
          PERF_P99_THRESHOLD: "25"
          PERF_BASELINE_PATH: "bench/perf_baseline.json"
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.sha }}
          path: bench/
          retention-days: 30

  windows:
    name: Windows Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo test --workspace
