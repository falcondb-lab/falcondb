[server]
pg_listen_addr = "0.0.0.0:5433"
admin_listen_addr = "0.0.0.0:8080"
node_id = 1
max_connections = 1024
statement_timeout_ms = 0
idle_timeout_ms = 0
shutdown_drain_timeout_secs = 30
slow_txn_threshold_us = 0

[storage]
memory_limit_bytes = 0
wal_enabled = true
data_dir = "./falcon_data"
lsm_sync_writes = false



[wal]
group_commit = true
flush_interval_us = 1000
sync_mode = "fdatasync"
segment_size_bytes = 67108864
wal_mode = "win_async"
no_buffering = false

[gc]
enabled = false

[cdc]
enabled = true
buffer_size = 100000

[pitr]
enabled = false
archive_dir = ""
retention_hours = 0

[multi_tenant]
enabled = false
metering_enabled = false
default_max_qps = 0
default_max_concurrent_txns = 0
default_max_memory_bytes = 0
default_max_storage_bytes = 0

[tde]
enabled = false
key_env_var = "FALCON_TDE_KEY"
encrypt_wal = true
encrypt_data = true

[memory]

# ── Raft consensus configuration ─────────────────────────────────────────────
# Active when replication.role = "raft_member".
# Single-node (default): node_id = 1, node_ids = [1], no peers.
# 3-node cluster example:
#   [replication]
#   role = "raft_member"
#
#   [raft]
#   node_id = 1                          # This node's unique ID (> 0)
#   node_ids = [1, 2, 3]                 # All nodes in the Raft cluster
#   raft_listen_addr = "0.0.0.0:50052"  # gRPC transport listen address
#   peers = [                            # Peer addresses (omit local node)
#     "2=http://node2:50052",
#     "3=http://node3:50052",
#   ]
#   failover_poll_interval_ms = 200      # How often to poll for leader changes
#   heartbeat_interval_ms = 50
#   election_timeout_min_ms = 150
#   election_timeout_max_ms = 300
[raft]
node_id = 1
node_ids = [1]
raft_listen_addr = "0.0.0.0:50052"
peers = []
failover_poll_interval_ms = 200
heartbeat_interval_ms = 50
election_timeout_min_ms = 150
election_timeout_max_ms = 300
