# FalconDB PoC #4 — Observability: Node 1 (Primary)
# PG 5433 | Admin 8080 | gRPC 50051

[server]
pg_listen_addr = "0.0.0.0:5435"
admin_listen_addr = "0.0.0.0:8082"
node_id = 1
max_connections = 256
statement_timeout_ms = 0
idle_timeout_ms = 0
shutdown_drain_timeout_secs = 30
slow_txn_threshold_us = 0

[storage]
wal_enabled = true
data_dir = "./node1_data"
memory_limit_bytes = 0
lsm_sync_writes = false

[wal]
group_commit = true
flush_interval_us = 1000
sync_mode = "fdatasync"
segment_size_bytes = 67108864
wal_mode = "auto"
no_buffering = false

[replication]
role = "primary"
grpc_listen_addr = "0.0.0.0:50051"
primary_endpoint = ""
max_records_per_chunk = 1000
poll_interval_ms = 100
max_backoff_ms = 30000
connect_timeout_ms = 5000
shard_count = 1

[gc]
enabled = false

[memory]
