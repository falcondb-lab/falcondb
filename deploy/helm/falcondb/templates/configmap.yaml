apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "falcondb.configName" . }}
  labels:
    {{- include "falcondb.labels" . | nindent 4 }}
data:
  falcon.toml: |
    config_version = 3

    [server]
    pg_listen_addr = "0.0.0.0:{{ .Values.falcondb.pgPort }}"
    admin_listen_addr = "0.0.0.0:{{ .Values.falcondb.adminPort }}"
    max_connections = {{ .Values.falcondb.maxConnections }}
    statement_timeout_ms = {{ .Values.falcondb.statementTimeoutMs }}
    idle_timeout_ms = {{ .Values.falcondb.idleTimeoutMs }}
    shutdown_drain_timeout_secs = {{ .Values.falcondb.shutdownDrainTimeoutSecs }}

    [server.auth]
    method = {{ .Values.falcondb.auth.method | quote }}
    username = {{ .Values.falcondb.auth.username | quote }}
    password = "${FALCON_DB_PASSWORD}"

    {{- if .Values.falcondb.tls.enabled }}
    [server.tls]
    cert_path = "/etc/falcondb/certs/tls.crt"
    key_path  = "/etc/falcondb/certs/tls.key"
    {{- end }}

    [storage]
    data_dir = "/var/lib/falcondb"
    wal_enabled = {{ .Values.falcondb.storage.walEnabled }}
    memory_limit_bytes = {{ .Values.falcondb.storage.memoryLimitBytes }}

    [wal]
    group_commit = {{ .Values.falcondb.wal.groupCommit }}
    flush_interval_us = {{ .Values.falcondb.wal.flushIntervalUs }}
    sync_mode = {{ .Values.falcondb.wal.syncMode | quote }}
    segment_size_bytes = {{ .Values.falcondb.wal.segmentSizeBytes }}

    [replication]
    role = {{ .Values.falcondb.role | quote }}
    grpc_listen_addr = "0.0.0.0:{{ .Values.falcondb.grpcPort }}"
    {{- if .Values.falcondb.replication.primaryEndpoint }}
    primary_endpoint = {{ .Values.falcondb.replication.primaryEndpoint | quote }}
    {{- end }}

    [gc]
    enabled = {{ .Values.falcondb.gc.enabled }}
    interval_ms = {{ .Values.falcondb.gc.intervalMs }}
    batch_size = {{ .Values.falcondb.gc.batchSize }}

    {{- if .Values.falcondb.extraConfig }}
    {{ .Values.falcondb.extraConfig | nindent 4 }}
    {{- end }}
