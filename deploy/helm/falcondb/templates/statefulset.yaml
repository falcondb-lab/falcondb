apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "falcondb.fullname" . }}
  labels:
    {{- include "falcondb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "falcondb.fullname" . }}-headless
  replicas: {{ if .Values.cluster.enabled }}{{ .Values.cluster.replicas }}{{ else }}{{ .Values.replicaCount }}{{ end }}
  selector:
    matchLabels:
      {{- include "falcondb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.metrics.enabled }}
        {{- toYaml .Values.metrics.annotations | nindent 8 }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "falcondb.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ add .Values.falcondb.shutdownDrainTimeoutSecs 5 }}
      containers:
        - name: falcondb
          image: {{ include "falcondb.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          args:
            - "--config"
            - "/etc/falcondb/falcon.toml"
          env:
            - name: FALCON_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "falcondb.secretName" . }}
                  key: {{ .Values.falcondb.auth.existingSecretKey }}
            - name: FALCON_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.cluster.enabled }}
            - name: FALCON_ROLE
              value: "primary"
            {{- end }}
          ports:
            - name: pg
              containerPort: {{ .Values.falcondb.pgPort }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.falcondb.adminPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.falcondb.grpcPort }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/falcondb
              readOnly: true
            - name: data
              mountPath: /var/lib/falcondb
            - name: tmp
              mountPath: /tmp
            {{- if .Values.falcondb.tls.enabled }}
            - name: tls
              mountPath: /etc/falcondb/certs
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "falcondb.configName" . }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.falcondb.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.falcondb.tls.existingSecret }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- else }}
  volumeClaimTemplates: []
  {{- end }}
